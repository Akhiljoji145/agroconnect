<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - AgroConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f0fdf4;
            margin: 0;
            color: #0f172a;
        }

        .navbar {
            background: rgba(5, 150, 105, 0.95);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar-brand,
        .nav-link {
            font-weight: 700;
            color: #fff !important;
        }

        .container-main {
            max-width: 650px;
            padding: 40px 20px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            padding: 30px;
            border: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #059669, #10b981);
        }

        .gateway-title {
            text-align: center;
            color: #064e3b;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .gateway-subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .summary {
            background: #ecfdf5;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px dashed #6ee7b7;
        }

        .summary p {
            margin: 8px 0;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            color: #064e3b;
        }

        .summary p.total {
            font-weight: 700;
            font-size: 20px;
            border-top: 1px solid #a7f3d0;
            padding-top: 12px;
            margin-top: 12px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-top: 16px;
            font-size: 14px;
            color: #334155;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            margin-top: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #059669;
            outline: none;
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-custom {
            margin-top: 24px;
            width: 100%;
            padding: 14px;
            background: #059669;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(5, 150, 105, 0.2);
        }

        .btn-custom:hover {
            background: #047857;
            transform: translateY(-1px);
        }

        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #64748b;
            margin-top: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="{% url 'consumer:dashboard' %}">
                <i class="fas fa-shopping-basket"></i> AgroConnect Market
            </a>
            <div class="ms-auto">
                <a class="nav-link text-white text-decoration-none" href="{% url 'consumer:view_cart' %}"><i
                        class="fas fa-arrow-left"></i> Back to Cart</a>
            </div>
        </div>
    </nav>

    <div class="container-main">
        <div class="card">
            <div class="gateway-title">Secure Checkout</div>
            <div class="gateway-subtitle">Mock Payment Gateway</div>

            <div class="summary">
                <p><span>Total Items:</span> <span>{{ cart.items.count }}</span></p>
                <p class="total"><span>Amount to Pay:</span> <span>₹{{ cart.total_price }}</span></p>
            </div>

            <form action="{% url 'consumer:process_payment' %}" method="post">
                {% csrf_token %}
                <label for="card"><i class="far fa-credit-card me-1"></i> Card Number</label>
                <input type="text" id="card" placeholder="0000 0000 0000 0000" required>

                <div class="grid-2">
                    <div>
                        <label for="expiry"><i class="far fa-calendar-alt me-1"></i> Expiry Date</label>
                        <input type="text" id="expiry" placeholder="MM/YY" required>
                    </div>
                    <div>
                        <label for="cvv"><i class="fas fa-lock me-1"></i> CVV</label>
                        <input type="text" id="cvv" placeholder="123" required>
                    </div>
                </div>

                <label for="name"><i class="far fa-user me-1"></i> Name on Card</label>
                <input type="text" id="name" placeholder="John Doe" required>

                <button type="submit" class="btn-custom"><i class="fas fa-check-circle me-1"></i> Pay ₹{{
                    cart.total_price }}</button>
            </form>

            <div class="secure-badge">
                <i class="fas fa-shield-alt text-success"></i> 256-bit Secure Encryption
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
